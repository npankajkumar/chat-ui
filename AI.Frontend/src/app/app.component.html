<div class="h-full flex flex-col bg-base-100">

  <!-- Top Navigation Bar -->
  <header class="shrink-0 h-14 flex items-center justify-between px-5 border-b border-base-300 bg-base-100 z-20">

    <!-- Brand -->
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-600 to-indigo-600 flex items-center justify-center shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2a1 1 0 0 1 .894.553l2.618 5.302 5.854.851a1 1 0 0 1 .554 1.706l-4.236 4.128.999 5.828a1 1 0 0 1-1.451 1.054L12 18.902l-5.232 2.52a1 1 0 0 1-1.451-1.054l.999-5.828L2.08 10.412a1 1 0 0 1 .554-1.706l5.854-.851L11.106 2.553A1 1 0 0 1 12 2Z"/>
        </svg>
      </div>
      <div class="flex items-center gap-2">
        <span class="font-semibold text-base-content text-sm">Enterprise AI</span>
        <span class="hidden sm:inline-flex items-center gap-1 text-[11px] font-mono bg-base-200 text-base-content/60 px-2 py-0.5 rounded-full border border-base-300">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block"></span>
          llama3.2
        </span>
      </div>
    </div>

    <!-- Theme toggle -->
    <button
      class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-base-200 transition-colors text-base-content/60 hover:text-base-content"
      (click)="toggleTheme()"
      [title]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (isDark()) {
        <!-- Sun -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      } @else {
        <!-- Moon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>
        </svg>
      }
    </button>

  </header>

  <!-- Page content — fills remaining height -->
  <main class="flex-1 overflow-hidden">
    <router-outlet></router-outlet>
  </main>

</div>
